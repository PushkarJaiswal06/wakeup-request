# =============================================================================
# Keep-Alive Workflow
# =============================================================================
# Scheduled GitHub Actions workflow that sends HTTP requests to configured
# Hugging Face Space endpoints to prevent them from going to sleep.
#
# Schedule: Every 1 hour (UTC)
# Trigger:  Cron schedule + manual workflow_dispatch
# Runner:   Ubuntu latest
# Runtime:  Node.js 20
# =============================================================================

name: Keep-Alive

on:
  schedule:
    # Run every 1 hour at minute 0 (UTC)
    - cron: '0 * * * *'
    - cron: '15 6 * * *'    # ~06:15 UTC — Early morning
    - cron: '15 11 * * *'    # ~09:15 UTC — morning    
    - cron: '42 12 * * *'   # ~11:42 UTC — Midday
    - cron: '8 17 * * *'    # ~17:08 UTC — Afternoon- cron: '15 6 * * *'    # ~06:15 UTC — Early morning
    - cron: '15 9 * * *'    # ~09:15 UTC — morning    
    - cron: '42 13 * * *'   # ~11:42 UTC — Midday
    - cron: '7 16 * * *'    # ~17:08 UTC — Afternoon
    - cron: '37 21 * * *'   # ~22:37 UTC — Late night
    - cron: '37 20 * * *'   # ~22:37 UTC — Late night

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

# Cancel any in-progress runs for the same workflow to avoid overlap
concurrency:
  group: keepalive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wake:
    name: Wake Endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Node.js 20
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -----------------------------------------------------------------------
      # Step 3: Install dependencies (if any)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund 2>/dev/null || echo "No lockfile found, skipping npm ci"

      # -----------------------------------------------------------------------
      # Step 4: Run wake script
      # -----------------------------------------------------------------------
      - name: Run wake script
        run: node src/wake.js
        env:
          NODE_ENV: production

      # -----------------------------------------------------------------------
      # Step 5: Optional — Slack/Discord notification on failure
      # Uncomment and configure when webhook integration is ready.
      # -----------------------------------------------------------------------
      # - name: Notify on failure
      #   if: failure()
      #   run: |
      #     curl -X POST -H 'Content-Type: application/json' \
      #       -d '{"text":"⚠️ Keep-alive wake cycle failed. Check GitHub Actions logs."}' \
      #       ${{ secrets.SLACK_WEBHOOK_URL }}
